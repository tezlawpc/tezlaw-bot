name: Update USCIS Processing Times

on:
  schedule:
    # Every Sunday at 6:00 AM PT (14:00 UTC)
    - cron: '0 14 * * 0'
  workflow_dispatch:

jobs:
  fetch-uscis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch USCIS processing times
        run: node fetch-uscis.js
        env:
          OUTPUT_PATH: ./uscis-times.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet uscis-times.json || (
            git add uscis-times.json &&
            git commit -m "chore: update USCIS processing times $(date +'%Y-%m-%d')" &&
            git push
          )
          echo "Done"
